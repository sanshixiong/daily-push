name: 股市日报定时推送

on:
  schedule:
    # 每天19:30（UTC时间11:30，北京时间+8）
    - cron: '30 11 * * *'
  workflow_dispatch:

jobs:
  push_stock_report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    - name: Run stock push script
      env:
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python scripts/stock_push_email.py
    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: stock-push-log
        path: stock_push.log
        retention-days: 7