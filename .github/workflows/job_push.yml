name: 求职日报定时推送

on:
  schedule:
    # 每天08:00（UTC时间00:00，北京时间+8）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  push_job_report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: python -m pip install --upgrade pip
    - name: Run job push script
      env:
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python scripts/job_push_email.py
    - name: Upload log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: job-push-log
        path: job_push.log
        retention-days: 7